<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약관리</title>

<style>
body { font-family: Arial, sans-serif; margin: 10px; }
h1 { text-align:center; }

.top-bar { text-align:center; margin-bottom:10px; }
button { padding:5px 10px; margin:5px; }

table { border-collapse: collapse; min-width:1200px; }
th, td {
  border:1px solid #ccc;
  padding:4px;
  text-align:center;
}

.time { background:#f2f2f2; font-weight:bold; width:50px; }

input { text-align:center; box-sizing:border-box; }

.input-m { width:45px; }
.input-g { width:55px; }
.input-r { width:45px; }

.input-tw { width:80px; }

.memo-input { width:95%; }

.checked { background:#ffe08a; }

.table-wrap { overflow-x:auto; }
</style>
</head>

<body>

<h1>예약관리</h1>

<div class="top-bar">
날짜:
<input type="date" id="datePicker">
<button onclick="setToday()">오늘</button>
<button onclick="saveData()">저장</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>시간</th>
<th colspan="3">15</th>
<th colspan="3">14</th>
<th colspan="3">13</th>
<th colspan="3">10</th>
<th colspan="3">동8</th>
<th colspan="3">동9</th>
</tr>
<tr>
<th></th>
<script>
for(let i=0;i<6;i++){
document.write("<th>M</th><th>G</th><th>R</th>");
}
</script>
</tr>
</thead>

<tbody id="tableBody">
</tbody>
</table>
</div>

<script>
const startHour=10;
const endHour=23;
const rooms=6;
const tableBody=document.getElementById("tableBody");
const datePicker=document.getElementById("datePicker");

function setToday(){
const today=new Date().toISOString().split("T")[0];
datePicker.value=today;
loadData();
}

function key(label,r,c){
return datePicker.value+"_"+label+"_"+r+"_"+c;
}

function generate(){
tableBody.innerHTML="";

// 상단 메모 3줄
for(let i=1;i<=3;i++){
let row="<tr>";
if(i===1) row+="<td rowspan='3' class='time'>메모</td>";
row+="<td colspan='18'><input class='memo-input' id='"+key("memo",0,i)+"'></td>";
row+="</tr>";
tableBody.innerHTML+=row;
}

// 시간표
for(let h=startHour;h<=endHour;h++){
let row="<tr>";
row+="<td class='time'>"+h+"</td>";

for(let r=1;r<=rooms;r++){

// M
let k1=key(h,r,"m");
row+="<td><input class='input-m' maxlength='2' onblur=\"this.value=this.value.replace(/[^가-힣]/g,'')\" id='"+k1+"'></td>";

// G
let k2=key(h,r,"g");
row+="<td><input class='input-g' maxlength='4' inputmode='numeric' oninput=\"this.value=this.value.replace(/[^0-9]/g,'')\" id='"+k2+"'></td>";

// R
let k3=key(h,r,"r");
row+="<td><input class='input-r' maxlength='2' onblur=\"this.value=this.value.replace(/[^가-힣]/g,'')\" id='"+k3+"'></td>";
}

row+="</tr>";
tableBody.innerHTML+=row;
}

// TW / TB
["TW","TB"].forEach(label=>{
let row="<tr>";
row+="<td class='time'>"+label+"</td>";

for(let r=1;r<=rooms;r++){
let textKey=key(label,r,"text");
let checkKey=key(label,r,"check");

row+="<td colspan='2'><input class='input-tw' id='"+textKey+"'></td>";
row+="<td><input type='checkbox' onchange=\"toggle('"+textKey+"',this)\"></td>";
}

row+="</tr>";
tableBody.innerHTML+=row;
});

loadData();
}

function toggle(textKey,cb){
let input=document.getElementById(textKey);
if(cb.checked){
input.classList.add("checked");
}else{
input.classList.remove("checked");
}
}

function saveData(){
if(!datePicker.value){alert("날짜 선택");return;}
document.querySelectorAll("input").forEach(el=>{
if(el.type==="checkbox"){
localStorage.setItem(el.parentElement.previousElementSibling.firstChild.id+"_check",el.checked);
}else{
localStorage.setItem(el.id,el.value);
}
});
alert("저장완료");
}

function loadData(){
if(!datePicker.value)return;
document.querySelectorAll("input").forEach(el=>{
let val=localStorage.getItem(el.id);
if(val!==null){
if(el.type==="checkbox"){
el.checked=(val==="true");
if(el.checked){
let text=el.parentElement.previousElementSibling.firstChild;
text.classList.add("checked");
}
}else{
el.value=val;
}
}
});
}

datePicker.addEventListener("change",generate);

setToday();
generate();
</script>

</body>
</html>
