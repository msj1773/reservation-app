<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약 관리 테이블</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 10px;
  }

  .table-wrapper {
    overflow-x: auto; /* 가로 스크롤 */
  }

  table {
    border-collapse: collapse;
    width: 100%;
    min-width: 800px; /* 최소 가로 폭 */
  }

  th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
    white-space: nowrap;
  }

  /* 고정 영역 */
  th.fixed, td.fixed {
    position: sticky;
    top: 0; /* 상단 고정 */
    background: #f9f9f9;
    z-index: 2;
  }

  /* M/G/R 고정 칸 */
  th.mgr, td.mgr {
    position: sticky;
    left: 0; /* 왼쪽 고정 */
    background: #f1f1f1;
    z-index: 3;
    min-width: 40px; /* 칸 폭 조정 */
  }

  /* 입력 가능 칸 */
  input {
    width: 100%;
    box-sizing: border-box;
    border: none;
    text-align: center;
  }

  input:focus {
    outline: 1px solid #007bff;
  }
</style>
</head>
<body>

<h2>예약 관리 테이블</h2>
<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th class="mgr">M</th>
        <th class="mgr">G</th>
        <th class="mgr">R</th>
        <th class="fixed">시간</th>
        <th>방1</th>
        <th>방2</th>
        <th>방3</th>
        <th>방4</th>
        <th>방5</th>
        <th>방6</th>
      </tr>
    </thead>
    <tbody>
      <!-- 예시: 10시~23시 -->
      <script>
        const tbody = document.currentScript.parentElement;
        for (let hour = 10; hour <= 23; hour++) {
          const tr = document.createElement('tr');

          // M/G/R 고정값
          ['M', 'G', 'R'].forEach(val => {
            const td = document.createElement('td');
            td.className = 'mgr';
            td.textContent = val; // 실제 데이터로 변경 가능
            tr.appendChild(td);
          });

          // 시간 고정
          const tdTime = document.createElement('td');
          tdTime.className = 'fixed';
          tdTime.textContent = hour + '시';
          tr.appendChild(tdTime);

          // 방 입력 칸 6개
          for (let i = 0; i < 6; i++) {
            const td = document.createElement('td');
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = '입력';
            td.appendChild(input);
            tr.appendChild(td);
          }

          tbody.appendChild(tr);
        }
      </script>
    </tbody>
  </table>
</div>

</body>
</html>
