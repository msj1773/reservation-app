<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약관리</title>

<style>
body { font-family: Arial, sans-serif; margin: 10px; }
h1 { text-align: center; }
.top-bar { text-align: center; margin-bottom: 10px; }
button { padding: 5px 10px; margin: 5px; }
.table-container { overflow-x: auto; }

table {
  border-collapse: collapse;
  min-width: 1800px;
}

th, td {
  border: 1px solid #ccc;
  padding: 4px;
  text-align: center;
}

input {
  box-sizing: border-box;
  text-align: center;
}

.input-free { width: 55px; }
.input-m { width: 45px; }
.input-g { width: 55px; }
.input-r { width: 45px; }

.input-tw, .input-tb { width: 80px; }

.time {
  font-weight: bold;
  background: #f2f2f2;
  width: 50px;
}

.checked {
  background-color: #ffe08a;
}
</style>
</head>

<body>

<h1>예약관리</h1>

<div class="top-bar">
  날짜: 
  <input type="date" id="datePicker">
  <button onclick="setToday()">오늘</button>
  <button onclick="saveData()">저장하기</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>시간</th>
<th colspan="12">15</th>
<th colspan="12">14</th>
<th colspan="12">13</th>
<th colspan="12">10</th>
<th colspan="12">동8</th>
<th colspan="12">동9</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>
</div>

<script>
const startHour = 10;
const endHour = 23;
const rooms = 6;
const roomNames = ["15","14","13","10","동8","동9"];
const tableBody = document.getElementById("tableBody");
const datePicker = document.getElementById("datePicker");

function setToday(){
  const today = new Date().toISOString().split("T")[0];
  datePicker.value = today;
  loadData();
}

function getKey(label,r,c){
  return datePicker.value + "_" + label + "_" + r + "_" + c;
}

function generateHourRow(hour){
  let row = "<tr>";
  row += `<td class="time">${hour}</td>`;

  for(let r=1; r<=rooms; r++){

    // 추가 3줄 × 3칸
    for(let line=1; line<=3; line++){
      for(let c=1; c<=3; c++){
        let key = getKey(hour,r,"free"+line+c);
        let saved = localStorage.getItem(key) || "";
        row += `<td><input class="input-free" id="${key}" value="${saved}"></td>`;
      }
    }

    // MGR
    for(let c=1; c<=3; c++){
      let key = getKey(hour,r,"mgr"+c);
      let saved = localStorage.getItem(key) || "";

      if(c===1){
        row += `<td><input class="input-m" maxlength="2"
          onblur="this.value=this.value.replace(/[^가-힣]/g,'')"
          id="${key}" value="${saved}"></td>`;
      }
      else if(c===2){
        row += `<td><input class="input-g" maxlength="4" inputmode="numeric"
          oninput="this.value=this.value.replace(/[^0-9]/g,'')"
          id="${key}" value="${saved}"></td>`;
      }
      else{
        row += `<td><input class="input-r" maxlength="2"
          onblur="this.value=this.value.replace(/[^가-힣]/g,'')"
          id="${key}" value="${saved}"></td>`;
      }
    }
  }

  row += "</tr>";
  tableBody.innerHTML += row;
}

function generateTW_TB_Row(label){
  let row = "<tr>";
  row += `<td class="time">${label}</td>`;

  for(let r=1; r<=rooms; r++){

    let textKey = getKey(label,r,"text");
    let checkKey = getKey(label,r,"check");

    let savedText = localStorage.getItem(textKey) || "";
    let savedCheck = localStorage.getItem(checkKey) === "true";

    row += `
      <td colspan="11">
        <input class="input-tw" id="${textKey}" value="${savedText}">
      </td>
      <td>
        <input type="checkbox" 
          onchange="toggleCheck('${textKey}', this)"
          ${savedCheck ? "checked" : ""}>
      </td>
    `;
  }

  row += "</tr>";
  tableBody.innerHTML += row;
}

function toggleCheck(textKey, checkbox){
  const input = document.getElementById(textKey);
  if(checkbox.checked){
    input.classList.add("checked");
    localStorage.setItem(textKey.replace("text","check"), "true");
  }else{
    input.classList.remove("checked");
    localStorage.setItem(textKey.replace("text","check"), "false");
  }
}

function saveData(){
  if(!datePicker.value){
    alert("날짜를 선택하세요");
    return;
  }
  document.querySelectorAll("input").forEach(input=>{
    if(input.type==="checkbox"){
      localStorage.setItem(input.getAttribute("onchange")?.match(/'(.*?)'/)?.[1]?.replace("text","check") || "", input.checked);
    }else{
      localStorage.setItem(input.id, input.value);
    }
  });
  alert("저장 완료!");
}

function loadData(){
  if(!datePicker.value) return;
  tableBody.innerHTML="";
  for(let h=startHour; h<=endHour; h++){
    generateHourRow(h);
  }
  generateTW_TB_Row("TW");
  generateTW_TB_Row("TB");
}

datePicker.addEventListener("change", loadData);

setToday();
</script>

</body>
</html>
