<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약관리</title>

<style>
body { font-family:sans-serif; margin:0; padding:10px; }

button { padding:6px 12px; margin-left:8px; }

table { border-collapse:collapse; font-size:14px; width:100%; }

th, td {
  border:1px solid #ccc;
  text-align:center;
  vertical-align:middle;
  padding:0;
}

th { background:#f2f2f2; }

.time { width:40px; font-weight:bold; background:#fafafa; }

.cell { min-height:40px; } 

.inner {
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.inner:focus {
  outline:none;
  background:#eef7ff;
}

.mcell { min-width:50px; }
.rcell { min-width:70px; }
.gcell { min-width:60px; }
</style>
</head>

<body>

<h3>예약관리</h3>
<input type="date" id="date">
<button onclick="saveData()">저장</button>

<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>

<script>
const rooms = ["15","14","13","10","동8","동9"];
const startHour = 10;
const endHour = 23;

const thead = document.getElementById("thead");
const tbody = document.getElementById("tbody");
const dateInput = document.getElementById("date");

dateInput.value = new Date().toISOString().substring(0,10);
dateInput.addEventListener("change", generate);

function key(id){
  return dateInput.value + "_" + id;
}

function makeCell(id, extra=""){
  return "<td class='cell'><div contenteditable='true' class='inner "+extra+"' id='"+key(id)+"'></div></td>";
}

function generate(){
  thead.innerHTML="";
  tbody.innerHTML="";

  // 방번호
  let row1="<tr><th class='time'>시간</th>";
  rooms.forEach(r=> row1+="<th colspan='3'>"+r+"</th>");
  row1+="</tr>";
  thead.innerHTML+=row1;

  // 메모
  for(let line=1; line<=3; line++){
    let row="<tr><td></td>";
    rooms.forEach((r,ri)=>{
      for(let c=1;c<=3;c++){
        row+=makeCell("memo_"+line+"_"+ri+"_"+c);
      }
    });
    row+="</tr>";
    thead.innerHTML+=row;
  }

  // MGR 행 (입력 가능)
  let rowMGR="<tr><td></td>";
  rooms.forEach((r,ri)=>{
    rowMGR+=makeCell("MGR_m_"+ri,"mcell");
    rowMGR+=makeCell("MGR_g_"+ri,"gcell");
    rowMGR+=makeCell("MGR_r_"+ri,"rcell");
  });
  rowMGR+="</tr>";
  thead.innerHTML+=rowMGR;

  // 시간표
  for(let h=startHour; h<=endHour; h++){
    let row="<tr><td class='time'>"+h+"</td>";
    rooms.forEach((r,ri)=>{
      row+=makeCell("h"+h+"_r"+ri+"_m","mcell");
      row+=makeCell("h"+h+"_r"+ri+"_g","gcell");
      row+=makeCell("h"+h+"_r"+ri+"_r","rcell");
    });
    row+="</tr>";
    tbody.innerHTML+=row;
  }

  // TW TB
  ["TW","TB"].forEach(label=>{
    let row="<tr><td class='time'>"+label+"</td>";
    rooms.forEach((r,ri)=>{
      let textId=key(label+"_r"+ri);
      let checkId=key(label+"_r"+ri+"_check");
      row+="<td colspan='2' class='cell'><div contenteditable='true' class='inner' id='"+textId+"'></div></td>";
      row+="<td><input type='checkbox' id='"+checkId+"'></td>";
    });
    row+="</tr>";
    tbody.innerHTML+=row;
  });

  attachEvents();
  loadData();
}

function attachEvents(){
  // Enter 줄바꿈 금지
  document.querySelectorAll(".inner").forEach(cell=>{
    cell.addEventListener("keydown", e => { if(e.key==="Enter") e.preventDefault(); });
  });

  // M 칸 한글 2글자 제한, blur 시점
  document.querySelectorAll(".mcell").forEach(cell=>{
    cell.addEventListener("blur", function(){
      this.innerText = this.innerText.replace(/[^가-힣]/g,"").slice(0,2);
    });
  });

  // R 칸 한글 3글자 제한, blur 시점
  document.querySelectorAll(".rcell").forEach(cell=>{
    cell.addEventListener("blur", function(){
      this.innerText = this.innerText.replace(/[^가-힣]/g,"").slice(0,3);
    });
  });

  // G 칸 숫자 4자리 제한, 실시간
  document.querySelectorAll(".gcell").forEach(cell=>{
    cell.addEventListener("input", function(){
      this.innerText = this.innerText.replace(/[^0-9]/g,"").slice(0,4);
    });
  });

  // 체크박스 배경
  document.addEventListener("change",function(e){
    if(e.target.type==="checkbox"){
      let textId=e.target.id.replace("_check","");
      let cell=document.getElementById(textId);
      if(cell){
        cell.style.background = e.target.checked ? "#ffe5e5" : "";
      }
    }
  });
}

function saveData(){
  let data = {};
  document.querySelectorAll(".inner").forEach(cell=>{ data[cell.id] = cell.innerText; });
  document.querySelectorAll("input[type='checkbox']").forEach(ch=>{ data[ch.id] = ch.checked ? "1" : "0"; });
  localStorage.setItem(dateInput.value, JSON.stringify(data));
  alert("저장되었습니다");
}

function loadData(){
  let saved = JSON.parse(localStorage.getItem(dateInput.value) || "{}");
  for(let id in saved){
    let el = document.getElementById(id);
    if(el){
      if(el.tagName==="DIV") el.innerText = saved[id];
      if(el.tagName==="INPUT") el.checked = saved[id]==="1";
      if(el.tagName==="INPUT" && el.type==="checkbox" && el.checked){
        let textId = el.id.replace("_check","");
        let cell = document.getElementById(textId);
        if(cell) cell.style.background="#ffe5e5";
      }
    }
  }
}

generate();
</script>
</body>
</html>
