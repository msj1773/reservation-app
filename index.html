<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약관리</title>

<style>
body { font-family:sans-serif; margin:0; padding:10px; }
table { border-collapse:collapse; font-size:14px; }
th, td {
  border:1px solid #ccc;
  text-align:center;
  vertical-align:middle;
}
th { background:#f2f2f2; }

.time { width:40px; font-weight:bold; background:#fafafa; }

.cell {
  min-width:55px;
  height:32px;
}
.cell:focus {
  outline:none;
  background:#eef7ff;
}
</style>
</head>

<body>

<h3>예약관리</h3>
<input type="date" id="date">

<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>

<script>

const rooms = ["15","14","13","10","동8","동9"];
const startHour = 10;
const endHour = 23;

const thead = document.getElementById("thead");
const tbody = document.getElementById("tbody");
const dateInput = document.getElementById("date");

dateInput.value = new Date().toISOString().substring(0,10);
dateInput.addEventListener("change", generate);

function key(id){ return dateInput.value + "_" + id; }

function generate(){

thead.innerHTML="";
tbody.innerHTML="";

/* ====== 헤더 1: 방번호 ====== */
let row1="<tr><th class='time'>시간</th>";
rooms.forEach(r=>{
row1+="<th colspan='3'>"+r+"</th>";
});
row1+="</tr>";
thead.innerHTML+=row1;

/* ====== 헤더 2~4: 메모 3줄 ====== */
for(let line=1; line<=3; line++){
let row="<tr><th></th>";
rooms.forEach((r,ri)=>{
for(let c=1;c<=3;c++){
let id="memo_"+line+"_"+ri+"_"+c;
row+="<th contenteditable='true' class='cell' id='"+key(id)+"'></th>";
}
});
row+="</tr>";
thead.innerHTML+=row;
}

/* ====== 헤더 5: M G R ====== */
let rowMGR="<tr><th></th>";
rooms.forEach((r,ri)=>{
rowMGR+="<th>M</th><th>G</th><th>R</th>";
});
rowMGR+="</tr>";
thead.innerHTML+=rowMGR;

/* ====== 시간표 ====== */
for(let h=startHour; h<=endHour; h++){
let row="<tr><td class='time'>"+h+"</td>";
rooms.forEach((r,ri)=>{

// M
let id1="h"+h+"_r"+ri+"_m";
row+="<td contenteditable='true' class='cell mcell' id='"+key(id1)+"'></td>";

// G
let id2="h"+h+"_r"+ri+"_g";
row+="<td contenteditable='true' class='cell gcell' id='"+key(id2)+"'></td>";

// R
let id3="h"+h+"_r"+ri+"_r";
row+="<td contenteditable='true' class='cell' id='"+key(id3)+"'></td>";

});
row+="</tr>";
tbody.innerHTML+=row;
}

/* ====== TW / TB ====== */
["TW","TB"].forEach(label=>{
let row="<tr><td class='time'>"+label+"</td>";
rooms.forEach((r,ri)=>{
let textId=label+"_r"+ri;
let checkId=textId+"_check";
row+="<td colspan='2' contenteditable='true' class='cell' id='"+key(textId)+"'></td>";
row+="<td><input type='checkbox' id='"+key(checkId)+"'></td>";
});
row+="</tr>";
tbody.innerHTML+=row;
});

applyRestrictions();
loadData();
}

/* ===== 입력 제한 ===== */
function applyRestrictions(){

// 줄바꿈 금지
document.querySelectorAll("[contenteditable='true']").forEach(cell=>{
cell.addEventListener("keydown",e=>{
if(e.key==="Enter") e.preventDefault();
});
});

// M 한글2
document.querySelectorAll(".mcell").forEach(cell=>{
cell.addEventListener("input",function(){
this.innerText=this.innerText.replace(/[^가-힣]/g,"").slice(0,2);
saveData();
});
});

// G 숫자4
document.querySelectorAll(".gcell").forEach(cell=>{
cell.addEventListener("input",function(){
this.innerText=this.innerText.replace(/[^0-9]/g,"").slice(0,4);
saveData();
});
});

// 기본 셀 저장
document.querySelectorAll("[contenteditable='true']").forEach(cell=>{
cell.addEventListener("input",saveData);
});

// 체크박스 저장 + 색
document.querySelectorAll("input[type='checkbox']").forEach(ch=>{
ch.addEventListener("change",function(){
let textId=this.id.replace("_check","");
let cell=document.getElementById(textId);
if(this.checked){
cell.style.background="#ffe5e5";
localStorage.setItem(this.id,"1");
}else{
cell.style.background="";
localStorage.removeItem(this.id);
}
saveData();
});
});
}

/* ===== 저장 ===== */
function saveData(){
document.querySelectorAll("[contenteditable='true']").forEach(cell=>{
localStorage.setItem(cell.id,cell.innerText);
});
}

/* ===== 불러오기 ===== */
function loadData(){

// 텍스트
document.querySelectorAll("[contenteditable='true']").forEach(cell=>{
let saved=localStorage.getItem(cell.id);
if(saved!==null) cell.innerText=saved;
});

// 체크
document.querySelectorAll("input[type='checkbox']").forEach(ch=>{
let saved=localStorage.getItem(ch.id);
if(saved){
ch.checked=true;
let textId=ch.id.replace("_check","");
let cell=document.getElementById(textId);
if(cell) cell.style.background="#ffe5e5";
}
});
}

generate();

</script>
</body>
</html>
