<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약관리</title>

<style>
body { font-family:sans-serif; margin:0; padding:10px; }

button {
  padding:6px 12px;
  margin-left:8px;
}

table {
  border-collapse:collapse;
  font-size:14px;
}

th, td {
  border:1px solid #ccc;
  text-align:center;
  vertical-align:middle;
  padding:0;
}

th { background:#f2f2f2; }

.time {
  width:40px;
  font-weight:bold;
  background:#fafafa;
}

/* 🔥 셀 */
.cell {
  min-width:55px;
  height:38px;
  padding:0;
}

/* 🔥 입력 영역 (모든 셀 동일 구조) */
.inner {
  width:100%;
  height:38px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}

.inner:focus {
  outline:none;
  background:#eef7ff;
}
</style>
</head>

<body>

<h3>예약관리</h3>
<input type="date" id="date">
<button onclick="saveData()">저장</button>

<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>

<script>

const rooms = ["15","14","13","10","동8","동9"];
const startHour = 10;
const endHour = 23;

const thead = document.getElementById("thead");
const tbody = document.getElementById("tbody");
const dateInput = document.getElementById("date");

dateInput.value = new Date().toISOString().substring(0,10);
dateInput.addEventListener("change", generate);

function key(id){
  return dateInput.value + "_" + id;
}

function makeCell(id, extraClass=""){
  return "<td class='cell'><div contenteditable='true' class='inner "+extraClass+"' id='"+key(id)+"'></div></td>";
}

function generate(){

thead.innerHTML="";
tbody.innerHTML="";

/* ===== 방 번호 ===== */
let row1="<tr><th class='time'>시간</th>";
rooms.forEach(r=>{
  row1+="<th colspan='3'>"+r+"</th>";
});
row1+="</tr>";
thead.innerHTML+=row1;

/* ===== 메모 3줄 ===== */
for(let line=1; line<=3; line++){
  let row="<tr><td></td>";
  rooms.forEach((r,ri)=>{
    for(let c=1;c<=3;c++){
      row+=makeCell("memo_"+line+"_"+ri+"_"+c);
    }
  });
  row+="</tr>";
  thead.innerHTML+=row;
}

/* ===== M G R ===== */
let rowMGR="<tr><td></td>";
rooms.forEach(()=>{
  rowMGR+="<th>M</th><th>G</th><th>R</th>";
});
rowMGR+="</tr>";
thead.innerHTML+=rowMGR;

/* ===== 시간표 ===== */
for(let h=startHour; h<=endHour; h++){
  let row="<tr><td class='time'>"+h+"</td>";
  rooms.forEach((r,ri)=>{
    row+=makeCell("h"+h+"_r"+ri+"_m","mcell");
    row+=makeCell("h"+h+"_r"+ri+"_g","gcell");
    row+=makeCell("h"+h+"_r"+ri+"_r","rcell");
  });
  row+="</tr>";
  tbody.innerHTML+=row;
}

/* ===== TW / TB ===== */
["TW","TB"].forEach(label=>{
  let row="<tr><td class='time'>"+label+"</td>";
  rooms.forEach((r,ri)=>{
    let textId=key(label+"_r"+ri);
    let checkId=key(label+"_r"+ri+"_check");

    row+="<td colspan='2' class='cell'><div contenteditable='true' class='inner' id='"+textId+"'></div></td>";
    row+="<td><input type='checkbox' id='"+checkId+"'></td>";
  });
  row+="</tr>";
  tbody.innerHTML+=row;
});

applyRestrictions();
loadData();
}

/* ===== 입력 제한 ===== */
function applyRestrictions(){

// 줄바꿈 금지
document.querySelectorAll(".inner").forEach(cell=>{
  cell.addEventListener("keydown",e=>{
    if(e.key==="Enter") e.preventDefault();
  });
});

// M 한글 2글자
document.querySelectorAll(".mcell").forEach(cell=>{
  cell.addEventListener("input",function(){
    this.innerText=this.innerText.replace(/[^가-힣]/g,"").slice(0,2);
  });
});

// R 한글 2글자
document.querySelectorAll(".rcell").forEach(cell=>{
  cell.addEventListener("input",function(){
    this.innerText=this.innerText.replace(/[^가-힣]/g,"").slice(0,2);
  });
});

// G 숫자 4자리
document.querySelectorAll(".gcell").forEach(cell=>{
  cell.addEventListener("input",function(){
    this.innerText=this.innerText.replace(/[^0-9]/g,"").slice(0,4);
  });
});

// TW/TB 체크 시 색 변경
document.querySelectorAll("input[type='checkbox']").forEach(ch=>{
  ch.addEventListener("change",function(){
    let textId=this.id.replace("_check","");
    let cell=document.getElementById(textId);
    if(this.checked){
      cell.style.background="#ffe5e5";
      localStorage.setItem(this.id,"1");
    }else{
      cell.style.background="";
      localStorage.removeItem(this.id);
    }
  });
});

}

/* ===== 저장 ===== */
function saveData(){
document.querySelectorAll(".inner").forEach(cell=>{
  localStorage.setItem(cell.id,cell.innerText);
});
alert("저장되었습니다");
}

/* ===== 불러오기 ===== */
function loadData(){
document.querySelectorAll(".inner").forEach(cell=>{
  let saved=localStorage.getItem(cell.id);
  if(saved!==null){
    cell.innerText=saved;
  }
});
document.querySelectorAll("input[type='checkbox']").forEach(ch=>{
  let saved=localStorage.getItem(ch.id);
  if(saved){
    ch.checked=true;
    let textId=ch.id.replace("_check","");
    let cell=document.getElementById(textId);
    if(cell) cell.style.background="#ffe5e5";
  }
});
}

generate();

</script>
</body>
</html>
