<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약 관리 테이블</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 10px;
  }

  .table-wrapper {
    overflow-x: auto; /* 가로 스크롤 */
  }

  table {
    border-collapse: collapse;
    width: 100%;
    min-width: 800px; /* 최소 가로 폭 */
  }

  th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
    white-space: nowrap;
  }

  /* 방 번호 헤더 상단 고정 */
  th.fixed-header {
    position: sticky;
    top: 0;
    background: #f9f9f9;
    z-index: 10;
  }

  /* 메모 입력 칸 */
  input.memo-input {
    width: 100%;
    box-sizing: border-box;
    text-align: center;
    border: none;
    padding: 4px;
  }

  input.memo-input:focus {
    outline: 1px solid #007bff;
  }

  /* M/G/R 읽기 전용 */
  td.mgr {
    background: #f1f1f1;
    font-weight: bold;
  }

  /* 방 입력 칸 */
  input.room-input {
    width: 100%;
    box-sizing: border-box;
    text-align: center;
    border: none;
  }

  input.room-input:focus {
    outline: 1px solid #007bff;
  }

  /* 시간 칸 고정 */
  td.time-cell {
    position: sticky;
    left: 0;
    background: #fff;
    z-index: 2;
  }
</style>
</head>
<body>

<h2>예약 관리 테이블</h2>
<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th class="fixed-header">방1</th>
        <th class="fixed-header">방2</th>
        <th class="fixed-header">방3</th>
        <th class="fixed-header">방4</th>
        <th class="fixed-header">방5</th>
        <th class="fixed-header">방6</th>
      </tr>
    </thead>
    <tbody>
      <!-- 메모 3줄 -->
      <tr>
        <td><input class="memo-input" placeholder="메모1-1"></td>
        <td><input class="memo-input" placeholder="메모1-2"></td>
        <td><input class="memo-input" placeholder="메모1-3"></td>
        <td></td><td></td><td></td>
      </tr>
      <tr>
        <td><input class="memo-input" placeholder="메모2-1"></td>
        <td><input class="memo-input" placeholder="메모2-2"></td>
        <td><input class="memo-input" placeholder="메모2-3"></td>
        <td></td><td></td><td></td>
      </tr>
      <tr>
        <td><input class="memo-input" placeholder="메모3-1"></td>
        <td><input class="memo-input" placeholder="메모3-2"></td>
        <td><input class="memo-input" placeholder="메모3-3"></td>
        <td></td><td></td><td></td>
      </tr>

      <!-- M/G/R 읽기 전용 -->
      <tr>
        <td class="mgr">M</td>
        <td class="mgr">G</td>
        <td class="mgr">R</td>
        <td></td><td></td><td></td>
      </tr>

      <!-- 시간 + 방 입력 칸 예시 -->
      <script>
        const tbody = document.currentScript.parentElement;
        for (let hour = 10; hour <= 23; hour++) {
          const tr = document.createElement('tr');

          // 시간 칸
          const tdTime = document.createElement('td');
          tdTime.className = 'time-cell';
          tdTime.textContent = hour + '시';
          tr.appendChild(tdTime);

          // 방 입력 칸 6개
          for (let i = 0; i < 6; i++) {
            const td = document.createElement('td');
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'room-input';
            input.placeholder = '입력';
            td.appendChild(input);
            tr.appendChild(td);
          }

          tbody.appendChild(tr);
        }
      </script>
    </tbody>
  </table>
</div>

</body>
</html>
